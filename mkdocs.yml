site_name: Tidemark
site_description: Public architecture documentation for Tidemark.
site_url: https://tidemarksh.github.io/docs/
repo_url: https://github.com/tidemarksh/docs
repo_name: tidemarksh/docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: blue

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Repositories: repositories.md
  - Design Principles: design-principles.md
  - Kernel: kernel.md
  - Runtime: runtime.md
  - SDK: sdk.md
  - Artifacts: artifacts.md
  - Status: status.md
