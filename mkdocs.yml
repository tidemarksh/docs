site_name: Tidemark
site_description: Public architecture documentation for Tidemark.
site_url: https://tidemarksh.github.io/docs/
repo_url: https://github.com/tidemarksh/docs
repo_name: tidemarksh/docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: blue

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Overview: index.md
  - Architecture:
      - Overview: architecture.md
      - Execution Model: architecture/execution-model.md
      - State And Filesystem: architecture/state-and-filesystem.md
      - Boundaries: architecture/boundaries.md
  - Kernel: kernel.md
  - Runtime: runtime.md
  - SDK: sdk.md
